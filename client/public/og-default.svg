<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <g transform="translate(80 120)">
    <rect x="0" y="0" width="48" height="6" fill="url(#accent)"/>
    <text x="0" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif" font-size="96" font-weight="700" fill="#f8fafc" letter-spacing="-2">AI Legal</text>
    <text x="0" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif" font-size="36" font-weight="500" fill="#cbd5e1">Global AI lawsuits &amp; regulations tracker</text>
  </g>

  <g transform="translate(80 380)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif" fill="#94a3b8" font-size="22">
    <g>
      <circle cx="10" cy="12" r="6" fill="#10b981"/>
      <text x="30" y="20">Every major AI court case, worldwide</text>
    </g>
    <g transform="translate(0 40)">
      <circle cx="10" cy="12" r="6" fill="#6366f1"/>
      <text x="30" y="20">Regulations across 15+ jurisdictions</text>
    </g>
    <g transform="translate(0 80)">
      <circle cx="10" cy="12" r="6" fill="#a855f7"/>
      <text x="30" y="20">Verified sources, timelines, open API</text>
    </g>
  </g>

  <text x="1120" y="580" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif" font-size="22" fill="#64748b">ailegal.co.za</text>
