# /etc/nginx/sites-available/ailegal.co.za
#
# Nginx server block for the public AI Legal site on Lightsail.
# After pasting, run:
#   sudo ln -s /etc/nginx/sites-available/ailegal.co.za /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d ailegal.co.za -d www.ailegal.co.za
#
# certbot will auto-rewrite the listen lines to add listen 443 ssl + http → https redirect.

# Tell nginx where the built Vite SPA lives on disk.
# Adjust if your checkout is elsewhere on Lightsail.
map $request_uri $_spa_root { default /home/ubuntu/holly/client/dist; }

server {
    listen 80;
    listen [::]:80;
    server_name ailegal.co.za www.ailegal.co.za;

    # ── Let's Encrypt renewal ────────────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # ── API (proxied to the Holly Node server) ───────────────────────────────
    # The public site only needs /api/public/* and /api/v1/*. Do NOT expose
    # the admin API here — serve that on a separate hostname or keep it
    # localhost-only on 3001.
    location ~ ^/api/(public|v1)/? {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # API responses already carry their own Cache-Control headers; don't
        # override.
    }

    # ── Detail pages — server-rendered HTML with per-item OG/Twitter tags ────
    # Social crawlers (Slack, Twitter, Discord, WhatsApp, LinkedIn, Facebook)
    # don't execute JS. Node injects real titles/descriptions for these URLs.
    location ~ ^/(lawsuits|regulations|usecases)/[0-9a-f-]{36}/?$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Detail HTML is mostly static; allow a short public cache so crawlers
        # and CDNs don't hammer the origin.
        add_header Cache-Control "public, max-age=60";
    }

    # ── Sitemap (dynamic, reflects live DB) ──────────────────────────────────
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # robots.txt is shipped with the SPA static build (client/public/robots.txt
    # → client/dist/robots.txt). It's served by the static fallback below — no
    # special location block needed.

    # ── SPA static assets ─────────────────────────────────────────────────────
    root /home/ubuntu/holly/client/dist;
    index index.html;

    # Cache hashed Vite assets aggressively (fingerprinted filenames).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Favicon + OG images — moderate cache.
    location ~* \.(svg|ico|png|jpg|jpeg|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Bare root: send visitors to the public legal home, not the admin login.
    location = / {
        return 302 /legal;
    }

    # SPA fallback: any unknown path falls through to index.html.
    # Do NOT cache index.html — it references fingerprinted bundles.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Reasonable client body cap for user submissions.
    client_max_body_size 2M;

    # Gzip text responses for faster first paint.
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/atom+xml application/rss+xml
               image/svg+xml;
}
